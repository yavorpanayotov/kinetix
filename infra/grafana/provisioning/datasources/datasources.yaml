apiVersion: 1

datasources:
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false

  # Tempo must be provisioned first — Prometheus and Loki reference its UID below,
  # and Grafana 12+ validates cross-references at provision time.

  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: tempo

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      # Logs arrive over OTLP, so the trace id is structured metadata on each
      # log line (field `trace_id`), not text in the body. Match on that field
      # and link straight to the trace in Tempo.
      derivedFields:
        - name: TraceID
          matcherType: label
          matcherRegex: trace_id
          url: "$${__value.raw}"
          urlDisplayLabel: "View trace"
          datasourceUid: tempo
