services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib
    container_name: kinetix-otel-collector
    command: ["--config", "/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
    networks: [kinetix]

  alertmanager:
    image: prom/alertmanager
    container_name: kinetix-alertmanager
    volumes:
      - ${ALERTMANAGER_CONFIG:-./alertmanager/alertmanager.yml}:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    restart: unless-stopped
    networks: [kinetix]

  prometheus:
    image: prom/prometheus
    container_name: kinetix-prometheus
    volumes:
      - ${PROMETHEUS_CONFIG:-./prometheus/prometheus.yml}:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheusdata:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    depends_on:
      alertmanager:
        condition: service_started
    networks: [kinetix]

  grafana:
    image: grafana/grafana
    container_name: kinetix-grafana
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # Dashboards as code: the version-controlled JSON under
      # deploy/observability/dashboards/ is mounted into a sub-folder of the
      # path the "Kinetix" file provider scans (foldersFromFilesStructure: true),
      # so these dashboards land in a "kinetix" Grafana folder.
      - ../deploy/observability/dashboards:/etc/grafana/provisioning/dashboards/kinetix:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Editor"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      # Set GRAFANA_ROOT_URL=https://grafana.kinetixrisk.ai on the prod host so
      # Grafana emits correct absolute asset URLs through the Caddy reverse
      # proxy. Without it, the SPA bootstrap fails with "Grafana has failed to
      # load its application files". Default keeps localhost dev working.
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
    networks: [kinetix]

  loki:
    image: grafana/loki
    container_name: kinetix-loki
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - lokidata:/loki
    ports:
      - "3100:3100"
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    restart: unless-stopped
    networks: [kinetix]

  tempo:
    image: grafana/tempo
    container_name: kinetix-tempo
    volumes:
      - ./tempo/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - tempodata:/var/tempo
    ports:
      - "3200:3200"
    command: ["-config.file", "/etc/tempo/tempo-config.yaml"]
    restart: unless-stopped
    networks: [kinetix]

  kafka-exporter:
    image: danielqsj/kafka-exporter
    container_name: kinetix-kafka-exporter
    command:
      - "--kafka.server=kafka:9092"
    ports:
      - "9308:9308"
    restart: unless-stopped
    networks: [kinetix]

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: kinetix-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://kinetix:kinetix@postgres:5432/kinetix_risk?sslmode=disable"
    ports:
      - "9187:9187"
    restart: unless-stopped
    networks: [kinetix]

volumes:
  prometheusdata:
  grafanadata:
  lokidata:
  tempodata:

networks:
  kinetix:
    external: true
