kube-prometheus-stack:
  enabled: true
  prometheus:
    prometheusSpec:
      additionalScrapeConfigs:
        - job_name: "gateway"
          metrics_path: "/metrics"
          static_configs:
            - targets: ["kinetix-gateway:8080"]
        - job_name: "position-service"
          metrics_path: "/metrics"
          static_configs:
            - targets: ["kinetix-position-service:8081"]
        - job_name: "price-service"
          metrics_path: "/metrics"
          static_configs:
            - targets: ["kinetix-price-service:8082"]
        - job_name: "risk-orchestrator"
          metrics_path: "/metrics"
          static_configs:
            - targets: ["kinetix-risk-orchestrator:8083"]
        - job_name: "audit-service"
          metrics_path: "/metrics"
          static_configs:
            - targets: ["kinetix-audit-service:8084"]
        - job_name: "regulatory-service"
          metrics_path: "/metrics"
          static_configs:
            - targets: ["kinetix-regulatory-service:8085"]
        - job_name: "notification-service"
          metrics_path: "/metrics"
          static_configs:
            - targets: ["kinetix-notification-service:8086"]
        - job_name: "rates-service"
          metrics_path: "/metrics"
          static_configs:
            - targets: ["kinetix-rates-service:8088"]
        - job_name: "reference-data-service"
          metrics_path: "/metrics"
          static_configs:
            - targets: ["kinetix-reference-data-service:8089"]
        - job_name: "volatility-service"
          metrics_path: "/metrics"
          static_configs:
            - targets: ["kinetix-volatility-service:8090"]
        - job_name: "correlation-service"
          metrics_path: "/metrics"
          static_configs:
            - targets: ["kinetix-correlation-service:8091"]
        - job_name: "risk-engine"
          metrics_path: "/metrics"
          static_configs:
            - targets: ["kinetix-risk-engine:9091"]
      additionalPrometheusRulesMap:
        kinetix-rules:
          groups:
            - name: kinetix-risk
              rules:
                - alert: VaRBreached
                  expr: risk_var_value > 1000000
                  for: 5m
                  labels:
                    severity: critical
                  annotations:
                    summary: "VaR breached threshold for book {{ $labels.book_id }}"
                    description: "VaR value {{ $value }} exceeds 1,000,000 for book {{ $labels.book_id }}"
                - alert: RiskCalculationSlow
                  expr: histogram_quantile(0.95, rate(risk_var_calculation_duration_seconds_bucket[5m])) > 30
                  for: 2m
                  labels:
                    severity: warning
                  annotations:
                    summary: "Risk calculation p95 latency exceeds 30s"
                    description: "P95 VaR calculation duration is {{ $value }}s"
                # Business-event alert: failed risk calculations (RISK_CALCULATION_FAILED).
                # DISABLED — no Prometheus metric for this signal is emitted yet.
                # A failed VaR run publishes a `RISK_CALCULATION_FAILED`
                # GovernanceAuditEvent to Kafka (persisted by audit-service) but
                # increments no Micrometer counter; `risk_var_calculation_total`
                # is incremented on success only with no status/outcome label.
                # To enable, risk-orchestrator must emit a Prometheus counter
                # (e.g. `risk_calculation_failed_total`) in the catch block of
                # VaRCalculationService, then uncomment and adjust:
                #
                # - alert: RiskCalculationFailureRate
                #   expr: rate(risk_calculation_failed_total[10m]) > 0
                #   for: 5m
                #   labels:
                #     severity: critical
                #   annotations:
                #     summary: "Risk calculations are failing"
                #     description: "VaR calculations have been failing over the last 10m ({{ $value }}/s) — the risk picture is incomplete."
            - name: kinetix-price
              rules:
                - alert: PriceStale
                  expr: price_staleness_seconds > 60
                  for: 5m
                  labels:
                    severity: warning
                  annotations:
                    summary: "Price data is stale for {{ $labels.instrument_id }}"
                    description: "Price staleness is {{ $value }}s for {{ $labels.instrument_id }}"
            - name: kinetix-kafka
              rules:
                - alert: KafkaConsumerLag
                  expr: kafka_consumergroup_lag > 10000
                  for: 10m
                  labels:
                    severity: warning
                  annotations:
                    summary: "Kafka consumer lag is high for {{ $labels.consumergroup }}"
                    description: "Consumer group {{ $labels.consumergroup }} has lag of {{ $value }} on topic {{ $labels.topic }}"
                # Business-event alert: unprocessed backlog in a dead-letter queue.
                # DLQ topics follow the `<topic>.dlq` convention emitted by
                # RetryableConsumer; lag on a `.dlq` topic means failed messages
                # are parked and nothing is draining them.
                - alert: KafkaDlqBacklog
                  expr: kafka_consumergroup_lag{topic=~".+\\.dlq"} > 0
                  for: 10m
                  labels:
                    severity: critical
                  annotations:
                    summary: "Dead-letter queue {{ $labels.topic }} has an unprocessed backlog"
                    description: "Consumer group {{ $labels.consumergroup }} has lag of {{ $value }} on dead-letter topic {{ $labels.topic }} — failed messages are parked in the DLQ and need manual triage and replay."
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
  grafana:
    adminUser: admin
    adminPassword: "${GRAFANA_ADMIN_PASSWORD}"
    grafana.ini:
      auth.anonymous:
        enabled: false
      server:
        # The ingress terminates TLS and forwards to Grafana over HTTP inside
        # the cluster.  Without root_url Grafana generates asset URLs relative
        # to "/" which an nginx rewrite strips, breaking the SPA bootstrap.
        root_url: "https://grafana.kinetixrisk.ai"
        serve_from_sub_path: false
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        nginx.ingress.kubernetes.io/rewrite-target: "/$2"
      hosts:
        - grafana.kinetixrisk.ai
      path: "/()(.*)"
      tls:
        - secretName: grafana-kinetixrisk-ai-tls
          hosts:
            - grafana.kinetixrisk.ai
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
    # Dashboards as code: provision the Kinetix dashboards from the ConfigMap
    # created by templates/grafana-dashboards-configmap.yaml. The same JSON
    # under deploy/observability/dashboards/ is mounted into the local
    # docker-compose Grafana, so prod and local run identical dashboards.
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: kinetix
            orgId: 1
            folder: Kinetix
            type: file
            disableDeletion: true
            editable: false
            allowUiUpdates: false
            options:
              path: /var/lib/grafana/dashboards/kinetix
    # Maps the provider above to the dashboard ConfigMap. The value is
    # tpl-rendered by the Grafana chart, so the release name resolves correctly.
    dashboardsConfigMaps:
      kinetix: '{{ .Release.Name }}-kinetix-grafana-dashboards'
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://kinetix-loki:3100
        access: proxy
      - name: Tempo
        type: tempo
        url: http://kinetix-tempo:3200
        access: proxy

loki:
  enabled: true
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    # Schema config required by loki chart v6+. Must be defined here rather
    # than as structuredConfig so the chart validation (validate.yaml) passes.
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    # Log retention: 90 days. Without this Loki keeps logs indefinitely
    # and the filesystem store grows without bound. The compactor must be
    # enabled with retention_enabled for limits_config.retention_period to
    # take effect. See docs/persistence.md "Data Retention Policies".
    limits_config:
      retention_period: 2160h # 90 days
    compactor:
      retention_enabled: true
      retention_delete_delay: 2h
      delete_request_store: filesystem
  singleBinary:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  # In SingleBinary deploymentMode the scalable targets must be zeroed out,
  # otherwise the chart validation rejects the config.
  write:
    replicas: 0
  read:
    replicas: 0
  backend:
    replicas: 0

tempo:
  enabled: true
  tempo:
    storage:
      trace:
        backend: local
    # Trace retention: 30 days. The Tempo compactor drops trace blocks
    # older than block_retention; the default leaves blocks indefinitely.
    # See docs/persistence.md "Data Retention Policies".
    retention: 720h # 30 days
    compactor:
      compaction:
        block_retention: 720h # 30 days
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

opentelemetry-collector:
  enabled: true
  mode: deployment
  # image.repository is required by opentelemetry-collector chart v0.100+.
  # The k8s distribution image includes all contrib receivers and exporters.
  image:
    repository: otel/opentelemetry-collector-k8s
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    exporters:
      otlphttp/loki:
        endpoint: http://kinetix-loki:3100/otlp
      otlp/tempo:
        endpoint: http://kinetix-tempo:4317
        tls:
          insecure: true
      prometheus:
        endpoint: 0.0.0.0:8889
    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [otlp/tempo]
        logs:
          receivers: [otlp]
          exporters: [otlphttp/loki]
        metrics:
          receivers: [otlp]
          exporters: [prometheus]
