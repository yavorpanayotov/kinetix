global:
  imageRegistry: ""
  imageTag: "latest"
  imagePullSecrets: []

namespace: kinetix

secrets:
  dbUsername: kinetix
  dbPassword: kinetix
  keycloakAdminPassword: admin

# --- PostgreSQL (Bitnami) ---
postgresql:
  image:
    registry: docker.io
    repository: timescale/timescaledb
    tag: latest-pg17
  auth:
    username: kinetix
    password: kinetix
    postgresPassword: postgres
  primary:
    initdb:
      scriptsConfigMap: '{{ include "kinetix.fullname" . }}-db-init'
    persistence:
      size: 10Gi

# --- Kafka (Bitnami, KRaft mode) ---
kafka:
  kraft:
    enabled: true
  controller:
    replicaCount: 1
  broker:
    replicaCount: 1
  provisioning:
    enabled: true
    topics:
      - name: trades.lifecycle
        partitions: 3
        replicationFactor: 1
      - name: price.updates
        partitions: 3
        replicationFactor: 1
      - name: risk.results
        partitions: 3
        replicationFactor: 1
      - name: risk.anomalies
        partitions: 3
        replicationFactor: 1
      - name: risk.audit
        partitions: 3
        replicationFactor: 1
      - name: rates.yield-curves
        partitions: 3
        replicationFactor: 1
      - name: rates.risk-free
        partitions: 3
        replicationFactor: 1
      - name: rates.forwards
        partitions: 3
        replicationFactor: 1
      - name: reference-data.dividends
        partitions: 3
        replicationFactor: 1
      - name: reference-data.credit-spreads
        partitions: 3
        replicationFactor: 1
      - name: volatility.surfaces
        partitions: 3
        replicationFactor: 1
      - name: correlation.matrices
        partitions: 3
        replicationFactor: 1
      - name: trades.lifecycle.dlq
        partitions: 1
        replicationFactor: 1
      - name: price.updates.dlq
        partitions: 1
        replicationFactor: 1
      - name: risk.results.dlq
        partitions: 1
        replicationFactor: 1
      - name: risk.anomalies.dlq
        partitions: 1
        replicationFactor: 1
  persistence:
    size: 10Gi

# --- Redis (Bitnami) ---
redis:
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      size: 2Gi

# --- Keycloak (Bitnami) ---
keycloak:
  auth:
    adminUser: admin
    adminPassword: admin
  postgresql:
    enabled: false
  externalDatabase:
    host: '{{ include "kinetix.databaseHost" . }}'
    port: 5432
    database: keycloak
    user: kinetix
    password: kinetix
  extraVolumeMounts:
    - name: realm-config
      mountPath: /opt/bitnami/keycloak/data/import
      readOnly: true
  extraVolumes:
    - name: realm-config
      configMap:
        name: '{{ include "kinetix.fullname" . }}-keycloak-realm'
  extraArgs:
    - "--import-realm"

# --- Service defaults ---
gateway:
  replicaCount: 1
  image:
    repository: kinetix/gateway
  service:
    port: 8080
  env:
    PORT: "8080"

position-service:
  replicaCount: 1
  image:
    repository: kinetix/position-service
  service:
    port: 8081
  env:
    PORT: "8081"
    KAFKA_BOOTSTRAP_SERVERS: "kinetix-kafka:9092"
    SEED_DATA: "true"

price-service:
  replicaCount: 1
  image:
    repository: kinetix/price-service
  service:
    port: 8082
  env:
    PORT: "8082"
    KAFKA_BOOTSTRAP_SERVERS: "kinetix-kafka:9092"
    SEED_DATA: "true"

risk-orchestrator:
  replicaCount: 1
  image:
    repository: kinetix/risk-orchestrator
  service:
    port: 8083
  env:
    PORT: "8083"
    KAFKA_BOOTSTRAP_SERVERS: "kinetix-kafka:9092"

# Disabled by default. Enable via --set demo-orchestrator.enabled=true or use
# values-demo.yaml overlay. See docs/plans/demo-v2.md for the demo-mode runbook.
demo-orchestrator:
  enabled: false
  replicaCount: 1
  image:
    repository: kinetix/demo-orchestrator
  service:
    port: 8094
  env:
    PORT: "8094"
    KAFKA_BOOTSTRAP_SERVERS: "kinetix-kafka:9092"
    DEMO_MODE: "true"
    POSITION_SERVICE_URL: "http://kinetix-position-service:8081"
    RISK_ORCHESTRATOR_URL: "http://kinetix-risk-orchestrator:8083"
    REGULATORY_SERVICE_URL: "http://kinetix-regulatory-service:8085"
    DEMO_TRADING_HOURS_START: "09:00"
    DEMO_TRADING_HOURS_END: "16:30"
    DEMO_TRADE_CADENCE_SECONDS: "90"

audit-service:
  replicaCount: 1
  image:
    repository: kinetix/audit-service
  service:
    port: 8084
  env:
    PORT: "8084"
    KAFKA_BOOTSTRAP_SERVERS: "kinetix-kafka:9092"
    SEED_DATA: "true"

fix-gateway:
  replicaCount: 1
  image:
    repository: kinetix/fix-gateway
  service:
    port: 8092
    grpcPort: 9105
  env:
    PORT: "8092"
    GRPC_PORT: "9105"
    DATABASE_URL: "jdbc:postgresql://kinetix-postgresql:5432/kinetix_fix_gateway"
    KAFKA_BOOTSTRAP_SERVERS: "kinetix-kafka:9092"

regulatory-service:
  replicaCount: 1
  image:
    repository: kinetix/regulatory-service
  service:
    port: 8085
  env:
    PORT: "8085"

notification-service:
  replicaCount: 1
  image:
    repository: kinetix/notification-service
  service:
    port: 8086
  env:
    PORT: "8086"
    DATABASE_URL: "jdbc:postgresql://kinetix-postgresql:5432/kinetix_notification"
    KAFKA_BOOTSTRAP_SERVERS: "kinetix-kafka:9092"
    SEED_DATA: "true"

risk-engine:
  replicaCount: 1
  image:
    repository: kinetix/risk-engine
  service:
    grpcPort: 50051
    metricsPort: 9091
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi

ai-insights-service:
  replicaCount: 1
  image:
    repository: kinetix/ai-insights-service
  service:
    port: 8095
  env:
    PORT: "8095"
    DEMO_MODE: "false"
    PYTHONPATH: "/app/src"
  claudeAuth:
    enabled: true
    hostPath: /root/.claude

ui:
  replicaCount: 1
  image:
    repository: kinetix/ui
  service:
    port: 80
  ingress:
    enabled: true
    className: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip

observability:
  enabled: true
