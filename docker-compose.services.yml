# Application services for containerised deployment
# Usage: docker compose -f infra/docker-compose.infra.yml -f infra/docker-compose.auth.yml -f infra/docker-compose.observability.yml -f docker-compose.services.yml up -d
# Note: build contexts use '..' because Docker Compose resolves relative paths
# from the first -f file's directory (infra/), not the project root.

services:
  # ── One-shot: create Kafka topics ──────────────────────────────────────────
  kafka-init:
    image: apache/kafka:3.9.0
    volumes:
      - ../infra/kafka/create-topics.sh:/opt/create-topics.sh:ro
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    entrypoint: ["/bin/bash", "/opt/create-topics.sh"]
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    networks: [kinetix]

  # ── Python risk engine (gRPC + Prometheus metrics) ─────────────────────────
  risk-engine:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.risk-engine
    environment:
      PYTHONPATH: /app/src
    expose:
      - "50051"
      - "9091"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9091/metrics')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks: [kinetix]

  # ── Python AI insights service (FastAPI + Claude Agent SDK) ────────────────
  # Routes LLM calls through the host user's Claude Code subscription via the
  # bind-mounted ~/.claude credentials directory. Set DEMO_MODE=true to bypass
  # the SDK and return canned responses (used in CI / Playwright).
  ai-insights-service:
    build:
      context: ../ai-insights-service
      dockerfile: Dockerfile
    environment:
      DEMO_MODE: "${DEMO_MODE:-false}"
      PYTHONPATH: /app/src
    expose:
      - "8095"
    volumes:
      - ~/.claude:/root/.claude:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8095/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks: [kinetix]

  # ── Kotlin services ────────────────────────────────────────────────────────
  position-service:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.kotlin
      args:
        SERVICE_NAME: position-service
    environment:
      SERVICE_NAME: position-service
      DATABASE_URL: jdbc:postgresql://postgres:5432/kinetix_position
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SEED_DATA: "true"
      DEMO_RESET_TOKEN: "${DEMO_RESET_TOKEN:-kinetix-demo-reset-dev}"
      OTEL_JAVA_GLOBAL_AUTOCONFIGURE_ENABLED: "true"
      OTEL_SERVICE_NAME: position-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_LOGS_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_TRACES_EXPORTER: none
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms64m -XX:+UseG1GC -XX:MaxGCPauseMillis=100"
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks: [kinetix]

  price-service:
