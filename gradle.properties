org.gradle.jvmargs=-Xmx2g -XX:+UseParallelGC
org.gradle.parallel=true
# Cap concurrent worker JVMs so test runs across modules don't spawn
# 10+ Testcontainers stacks at once on a developer laptop. Override locally
# via `org.gradle.workers.max=N` in ~/.gradle/gradle.properties if needed.
org.gradle.workers.max=3
org.gradle.caching=true
org.gradle.configuration-cache=true
kotlin.code.style=official
